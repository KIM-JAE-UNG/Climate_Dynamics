<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEEP DROP — 심해 낚시 테트리스</title>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cyan:#00e5ff;--green:#00e676;--pink:#ff4081;
  --coral:#ff7043;--gold:#ffd740;--purple:#b388ff;
  --bg:#0a1628;
}
body{
  background:var(--bg);font-family:'Noto Sans KR',sans-serif;
  color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#ocean-bg{position:fixed;inset:0;z-index:0;overflow:hidden}
#ocean-bg canvas{width:100%;height:100%}

#app{position:relative;z-index:1;display:flex;gap:18px;align-items:flex-start;padding:16px}

.panel{width:155px;display:flex;flex-direction:column;gap:12px}
.box{
  background:rgba(10,22,40,0.88);border:1px solid rgba(0,229,255,0.12);
  border-radius:12px;padding:14px;position:relative;overflow:hidden;
  backdrop-filter:blur(8px);
}
.box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(0,229,255,0.5),transparent);
}
.box-t{
  font-family:'Righteous',cursive;font-size:10px;letter-spacing:2px;
  color:var(--cyan);text-transform:uppercase;margin-bottom:8px;text-align:center;opacity:0.8;
}
.box-v{
  font-family:'Righteous',cursive;font-size:22px;text-align:center;
  color:#fff;text-shadow:0 0 12px rgba(0,229,255,0.4);
}
.box-v.gold{color:var(--gold);text-shadow:0 0 12px rgba(255,215,64,0.5)}
.box-v small{font-size:11px;opacity:0.6;margin-left:2px}
.preview{display:flex;justify-content:center;padding:4px 0}

.depth-bar{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;margin-top:6px;overflow:hidden}
.depth-fill{height:100%;border-radius:3px;transition:width .4s;background:linear-gradient(90deg,#00e5ff,#00e676)}

.fish-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:6px}
.fish-item{
  aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:16px;position:relative;background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.05);transition:all .3s;
}
.fish-item.caught{background:rgba(0,229,255,0.08);border-color:rgba(0,229,255,0.2);animation:fishPop .4s ease}
.fish-item .count{position:absolute;bottom:1px;right:3px;font-size:7px;font-family:'Righteous',cursive;color:var(--cyan)}
@keyframes fishPop{0%{transform:scale(1.3)}100%{transform:scale(1)}}

#board-wrap{
  position:relative;margin-top:26px;border-radius:12px;overflow:hidden;
  border:2px solid rgba(0,229,255,0.15);
  box-shadow:0 0 40px rgba(0,229,255,0.08),inset 0 0 40px rgba(0,0,0,0.4);
}
#board-wrap::before{
  content:'🎣 DEEP DROP';position:absolute;top:-26px;left:50%;transform:translateX(-50%);
  font-family:'Righteous',cursive;font-size:13px;letter-spacing:3px;
  color:var(--cyan);text-shadow:0 0 12px var(--cyan);white-space:nowrap;
}
canvas#game{display:block;background:rgba(6,18,36,0.95)}

#catch-notify{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;z-index:20;text-align:center;opacity:0;transition:all .4s;
}
#catch-notify.show{opacity:1;transform:translate(-50%,-60%)}
#catch-notify .fish-name{font-family:'Righteous',cursive;font-size:28px;text-shadow:0 0 20px currentColor}
#catch-notify .sub{font-size:13px;opacity:0.7;margin-top:2px}

.ov{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:10;
  background:rgba(6,12,24,0.93);backdrop-filter:blur(8px);transition:opacity .3s;
}
.ov.hide{opacity:0;pointer-events:none}
.ov h1{
  font-family:'Righteous',cursive;font-size:24px;letter-spacing:3px;
  background:linear-gradient(135deg,var(--cyan),var(--green));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;
}
.ov .emoji{font-size:48px;margin-bottom:10px}
.ov p{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:16px}
.ov .big{font-family:'Righteous',cursive;font-size:36px;color:var(--gold);text-shadow:0 0 20px rgba(255,215,64,0.5);margin-bottom:2px}
.ov .stats{font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:16px;max-width:250px;text-align:center;line-height:1.6}
.btn{
  font-family:'Righteous',cursive;font-size:13px;letter-spacing:2px;
  padding:12px 32px;border:1px solid var(--cyan);background:rgba(0,229,255,0.08);
  color:var(--cyan);border-radius:8px;cursor:pointer;text-transform:uppercase;transition:all .2s;
}
.btn:hover{background:rgba(0,229,255,0.18);box-shadow:0 0 20px rgba(0,229,255,0.25)}

.keys{font-size:10px;line-height:2.2;color:rgba(255,255,255,0.35)}
.keys kbd{
  display:inline-block;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  border-radius:3px;padding:1px 5px;font-family:'Righteous',cursive;font-size:8px;
  color:var(--cyan);margin-right:2px;
}

.mob{display:none;position:fixed;bottom:0;left:0;right:0;padding:10px;z-index:5;background:linear-gradient(transparent,rgba(6,12,24,0.95))}
.mob-row{display:flex;justify-content:center;gap:8px;margin-bottom:6px}
.mob-btn{
  width:50px;height:50px;border-radius:10px;background:rgba(0,229,255,0.08);
  border:1px solid rgba(0,229,255,0.15);color:var(--cyan);font-size:18px;
  display:flex;align-items:center;justify-content:center;user-select:none;cursor:pointer;
}
.mob-btn:active{background:rgba(0,229,255,0.25)}
@media(max-width:700px){
  #app{flex-direction:column;align-items:center;gap:8px;padding:6px}
  .panel{flex-direction:row;width:100%;gap:6px;flex-wrap:wrap;justify-content:center}
  .box{flex:1;min-width:120px;max-width:170px;padding:10px}
  .keys{display:none}.mob{display:block}.box-v{font-size:17px}
  #board-wrap::before{top:-22px;font-size:11px}
}
@media(hover:none){.mob{display:block}}
</style>
</head>
<body>
<div id="ocean-bg"><canvas id="bgCanvas"></canvas></div>
<div id="app">
  <div class="panel">
    <div class="box"><div class="box-t">🪣 보관함</div><div class="preview"><canvas id="holdC" width="96" height="72"></canvas></div></div>
    <div class="box"><div class="box-t">⚖️ 총 무게</div><div class="box-v gold" id="dScore">0<small>kg</small></div></div>
    <div class="box"><div class="box-t">🌊 수심</div><div class="box-v" id="dLevel" style="font-size:13px">얕은 바다 🏖️</div><div class="depth-bar"><div class="depth-fill" id="dBar" style="width:0%"></div></div></div>
    <div class="box"><div class="box-t">🐟 도감</div><div class="fish-grid" id="fishGrid"></div></div>
  </div>
  <div id="board-wrap">
    <canvas id="game"></canvas>
    <div class="ov" id="ovStart">
      <div class="emoji">🎣</div><h1>DEEP DROP</h1><p>심해 낚시 테트리스</p>
      <button class="btn" onclick="startGame()">출항하기</button>
    </div>
    <div class="ov hide" id="ovEnd">
      <div class="emoji">⚓</div><h1>귀항</h1><div class="big" id="dFinal">0kg</div>
      <div class="stats" id="dStats"></div>
      <button class="btn" onclick="startGame()">다시 출항</button>
    </div>
  </div>
  <div class="panel">
    <div class="box"><div class="box-t">🔮 다음</div><div class="preview"><canvas id="nextC" width="96" height="250"></canvas></div></div>
    <div class="box"><div class="box-t">🔥 연속 낚시</div><div class="box-v gold" id="dCombo">0</div></div>
    <div class="box"><div class="box-t">📏 총 줄수</div><div class="box-v" id="dLines">0</div></div>
    <div class="box keys"><div class="box-t">조작법</div><kbd>←</kbd><kbd>→</kbd> 이동<br><kbd>↑</kbd> 회전<br><kbd>↓</kbd> 내리기<br><kbd>Space</kbd> 투하<br><kbd>C</kbd> 보관<br><kbd>P</kbd> 일시정지</div>
  </div>
</div>
<div id="catch-notify"><div class="fish-name" id="catchName"></div><div class="sub" id="catchSub"></div></div>
<div class="mob">
  <div class="mob-row">
    <div class="mob-btn" ontouchstart="doAction('rotCW')">↻</div>
    <div class="mob-btn" ontouchstart="doAction('hard')">⤓</div>
    <div class="mob-btn" ontouchstart="doAction('hold')">🪣</div>
  </div>
  <div class="mob-row">
    <div class="mob-btn" ontouchstart="doAction('left')">◀</div>
    <div class="mob-btn" ontouchstart="doAction('soft')">▼</div>
    <div class="mob-btn" ontouchstart="doAction('right')">▶</div>
  </div>
</div>
<script>
const FISH={
  I:{name:'장어',emoji:'🐍',shape:[[0,0],[1,0],[2,0],[3,0]],color:'#00e5ff',glow:'rgba(0,229,255,0.6)',weight:3.2},
  O:{name:'복어',emoji:'🐡',shape:[[0,0],[1,0],[0,1],[1,1]],color:'#ffd740',glow:'rgba(255,215,64,0.6)',weight:1.5},
  T:{name:'가오리',emoji:'🦈',shape:[[1,0],[0,1],[1,1],[2,1]],color:'#b388ff',glow:'rgba(179,136,255,0.6)',weight:4.8},
  S:{name:'해마',emoji:'🐴',shape:[[1,0],[2,0],[0,1],[1,1]],color:'#00e676',glow:'rgba(0,230,118,0.6)',weight:0.8},
  Z:{name:'새우',emoji:'🦐',shape:[[0,0],[1,0],[1,1],[2,1]],color:'#ff4081',glow:'rgba(255,64,129,0.6)',weight:0.5},
  J:{name:'고등어',emoji:'🐟',shape:[[0,0],[0,1],[1,1],[2,1]],color:'#448aff',glow:'rgba(68,138,255,0.6)',weight:2.1},
  L:{name:'문어',emoji:'🐙',shape:[[2,0],[0,1],[1,1],[2,1]],color:'#ff7043',glow:'rgba(255,112,67,0.6)',weight:3.5}
};
const TYPES=Object.keys(FISH);
const DEPTHS=['얕은 바다 🏖️','연안 🌊','외해 ⛵','심해 입구 🌑','심해 🐙','해저 화산 🌋','마리아나 해구 👀'];

const CO=10,RO=20,SZ=30;
const cv=document.getElementById('game'),cx=cv.getContext('2d');
cv.width=CO*SZ;cv.height=RO*SZ;
const hCv=document.getElementById('holdC'),hCx=hCv.getContext('2d');
const nCv=document.getElementById('nextC'),nCx=nCv.getContext('2d');

// Background
const bgCv=document.getElementById('bgCanvas'),bgCx=bgCv.getContext('2d');
let bubbles=[];
function initBg(){
  bgCv.width=window.innerWidth;bgCv.height=window.innerHeight;
  bubbles=[];for(let i=0;i<40;i++)bubbles.push({x:Math.random()*bgCv.width,y:Math.random()*bgCv.height,r:1+Math.random()*4,speed:.2+Math.random()*.8,wobble:Math.random()*Math.PI*2,wobbleSpeed:.01+Math.random()*.02});
}
window.addEventListener('resize',initBg);initBg();

function drawBg(dp){
  const w=bgCv.width,h=bgCv.height;
  const g=bgCx.createLinearGradient(0,0,0,h);
  const d=Math.min(dp*0.7,0.7);
  g.addColorStop(0,`rgb(${Math.round(13-d*13)},${Math.round(31-d*20)},${Math.round(60-d*40)})`);
  g.addColorStop(1,`rgb(${Math.round(6-d*6)},${Math.round(12-d*10)},${Math.round(24-d*15)})`);
  bgCx.fillStyle=g;bgCx.fillRect(0,0,w,h);
  const ra=Math.max(0.03-dp*0.025,0.005);
  for(let i=0;i<5;i++){bgCx.save();bgCx.globalAlpha=ra;bgCx.fillStyle='#00e5ff';bgCx.beginPath();const rx=w*0.1+i*w*0.2;bgCx.moveTo(rx,0);bgCx.lineTo(rx-60,h);bgCx.lineTo(rx+60,h);bgCx.closePath();bgCx.fill();bgCx.restore();}
  bubbles.forEach(b=>{b.y-=b.speed;b.wobble+=b.wobbleSpeed;if(b.y<-10){b.y=h+10;b.x=Math.random()*w;}const bx=b.x+Math.sin(b.wobble)*15;bgCx.save();bgCx.globalAlpha=0.15+b.r*0.05;bgCx.strokeStyle='rgba(0,229,255,0.5)';bgCx.lineWidth=0.8;bgCx.beginPath();bgCx.arc(bx,b.y,b.r,0,Math.PI*2);bgCx.stroke();bgCx.fillStyle='rgba(0,229,255,0.15)';bgCx.beginPath();bgCx.arc(bx-b.r*0.3,b.y-b.r*0.3,b.r*0.3,0,Math.PI*2);bgCx.fill();bgCx.restore();});
}

// State
let grid,cur,ghostY,queue,hold,canSwap,score,lines,level,combo,speed,playing,paused,dropAcc,particles=[],lastT=0,fishCaught={},totalFish=0;

// Helpers
function rRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();c.fill();}
let bag=[];
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function nextPiece(){if(!bag.length)bag=shuffle([...TYPES]);return bag.pop();}
function fillQ(){while(queue.length<4)queue.push(nextPiece());}

// Fish grid
function initFishGrid(){
  const g=document.getElementById('fishGrid');g.innerHTML='';
  TYPES.forEach(t=>{const d=document.createElement('div');d.className='fish-item';d.id='fish-'+t;d.title=FISH[t].name;d.innerHTML=`<span style="opacity:0.3">${FISH[t].emoji}</span><span class="count">0</span>`;g.appendChild(d);});
  const tot=document.createElement('div');tot.className='fish-item';tot.id='fish-total';tot.innerHTML='<span style="font-size:10px">📊</span><span class="count" id="totalFishCount">0</span>';tot.title='총 마릿수';g.appendChild(tot);
}
function updateFishUI(type){
  const el=document.getElementById('fish-'+type);
  if(el){el.className='fish-item caught';el.innerHTML=`${FISH[type].emoji}<span class="count">${fishCaught[type]||0}</span>`;}
  document.getElementById('totalFishCount').textContent=totalFish;
}

// Catch notify
let catchTO;
function showCatch(types,lc){
  const el=document.getElementById('catch-notify'),ne=document.getElementById('catchName'),se=document.getElementById('catchSub');
  const u=[...new Set(types)],em=u.map(t=>FISH[t].emoji).join(' '),tw=types.reduce((s,t)=>s+FISH[t].weight,0).toFixed(1);
  const lb=['','🎣 한마리!','🎣🎣 더블!','🎣🎣🎣 트리플!','🐋 대어 폭발!!'];
  ne.textContent=em;ne.style.color=FISH[u[0]].color;se.textContent=`${lb[lc]} +${tw}kg`;
  el.classList.add('show');clearTimeout(catchTO);catchTO=setTimeout(()=>el.classList.remove('show'),1200);
}

// Piece logic
function spawn(){
  fillQ();const t=queue.shift();fillQ();
  const s=FISH[t].shape,mnX=Math.min(...s.map(p=>p[0])),mxX=Math.max(...s.map(p=>p[0]));
  const offX=Math.floor((CO-(mxX-mnX+1))/2)-mnX;
  cur={type:t,cells:s.map(([x,y])=>({x:x+offX,y})),rot:0};canSwap=true;calcGhost();
  if(!valid(cur.cells)){gameEnd();return false;}return true;
}
function valid(cells){return cells.every(({x,y})=>x>=0&&x<CO&&y<RO&&(y<0||!grid[y][x]));}
function calcGhost(){let dy=0;while(cur.cells.every(({x,y})=>{const ny=y+dy+1;return x>=0&&x<CO&&ny<RO&&(ny<0||!grid[ny][x]);}))dy++;ghostY=dy;}
function move(dx,dy){const nc=cur.cells.map(({x,y})=>({x:x+dx,y:y+dy}));if(valid(nc)){cur.cells=nc;calcGhost();return true;}return false;}
function rotate(dir){
  if(cur.type==='O')return;
  const cx2=cur.cells.reduce((s,p)=>s+p.x,0)/4,cy2=cur.cells.reduce((s,p)=>s+p.y,0)/4;
  const nc=cur.cells.map(({x,y})=>{const dx=x-cx2,dy=y-cy2;return dir===1?{x:Math.round(cx2-dy),y:Math.round(cy2+dx)}:{x:Math.round(cx2+dy),y:Math.round(cy2-dx)};});
  const kicks=[{x:0,y:0},{x:-1,y:0},{x:1,y:0},{x:0,y:-1},{x:-1,y:-1},{x:1,y:-1},{x:0,y:-2}];
  for(const k of kicks){const kc=nc.map(p=>({x:p.x+k.x,y:p.y+k.y}));if(valid(kc)){cur.cells=kc;cur.rot=(cur.rot+(dir===1?1:3))%4;calcGhost();return;}}
}
function hardDrop(){cur.cells.forEach(p=>p.y+=ghostY);score+=ghostY*2;lock();}
function lock(){cur.cells.forEach(({x,y})=>{if(y>=0)grid[y][x]=cur.type;});clearLines();spawn();}
function clearLines(){
  let cleared=[];
  for(let r=RO-1;r>=0;r--)if(grid[r].every(c=>c!==0)){
    cleared.push(r);
    for(let c=0;c<CO;c++){const t=grid[r][c];if(t){fishCaught[t]=(fishCaught[t]||0)+1;totalFish++;updateFishUI(t);const col=FISH[t].color;for(let i=0;i<5;i++)particles.push({x:c*SZ+SZ/2,y:r*SZ+SZ/2,vx:(Math.random()-.5)*7,vy:-Math.random()*6-2,life:1,color:col,size:2+Math.random()*4});}}
  }
  if(cleared.length){
    const ct=[];cleared.forEach(r=>{for(let c=0;c<CO;c++)if(grid[r][c])ct.push(grid[r][c]);});
    cleared.forEach(r=>{grid.splice(r,1);grid.unshift(Array(CO).fill(0));});
    combo++;const ST=[0,100,300,500,800];
    const wb=ct.reduce((s,t)=>s+FISH[t].weight,0);
    score+=ST[cleared.length]*level+(combo>1?50*combo*level:0)+Math.round(wb);
    lines+=cleared.length;const nl=Math.floor(lines/10)+1;
    if(nl>level){level=Math.min(nl,7);speed=Math.max(80,800-(level-1)*100);}
    showCatch(ct,cleared.length);
  }else combo=0;
  updateUI();
}
function doHold(){
  if(!canSwap)return;canSwap=false;const t=cur.type;
  if(hold){const h=hold;hold=t;const s=FISH[h].shape,mnX=Math.min(...s.map(p=>p[0])),mxX=Math.max(...s.map(p=>p[0]));const offX=Math.floor((CO-(mxX-mnX+1))/2)-mnX;cur={type:h,cells:s.map(([x,y])=>({x:x+offX,y})),rot:0};calcGhost();}
  else{hold=t;spawn();}drawHold();
}

// Drawing
function drawBlock(c,px,py,type,sz,alpha){
  const f=FISH[type];c.save();c.globalAlpha=alpha||1;
  c.shadowColor=f.glow;c.shadowBlur=12;c.fillStyle=f.color;rRect(c,px+1,py+1,sz-2,sz-2,4);
  c.shadowBlur=0;
  const lg=c.createLinearGradient(px,py,px,py+sz);lg.addColorStop(0,'rgba(255,255,255,0.25)');lg.addColorStop(0.5,'rgba(255,255,255,0.05)');lg.addColorStop(1,'rgba(0,0,0,0.15)');
  c.fillStyle=lg;rRect(c,px+1,py+1,sz-2,sz-2,4);
  if(sz>=20&&(alpha===undefined||alpha>0.5)){c.globalAlpha=(alpha||1)*0.55;c.font=`${sz*0.45}px serif`;c.textAlign='center';c.textBaseline='middle';c.fillText(f.emoji,px+sz/2,py+sz/2+1);}
  c.restore();
}
function drawGame(){
  cx.clearRect(0,0,cv.width,cv.height);
  const time=performance.now()*0.001;
  cx.save();cx.globalAlpha=0.02;
  for(let i=0;i<5;i++){cx.strokeStyle='#00e5ff';cx.lineWidth=20;cx.beginPath();for(let x=0;x<cv.width;x+=4){const y=Math.sin(x*0.02+time+i)*15+i*cv.height/5;x===0?cx.moveTo(x,y):cx.lineTo(x,y);}cx.stroke();}
  cx.restore();
  cx.strokeStyle='rgba(0,229,255,0.035)';cx.lineWidth=.5;
  for(let x=1;x<CO;x++){cx.beginPath();cx.moveTo(x*SZ,0);cx.lineTo(x*SZ,RO*SZ);cx.stroke();}
  for(let y=1;y<RO;y++){cx.beginPath();cx.moveTo(0,y*SZ);cx.lineTo(CO*SZ,y*SZ);cx.stroke();}
  for(let r=0;r<RO;r++)for(let c=0;c<CO;c++)if(grid[r][c])drawBlock(cx,c*SZ,r*SZ,grid[r][c],SZ);
  if(!cur)return;
  cur.cells.forEach(({x,y})=>{const gy=y+ghostY;if(gy>=0&&gy<RO)drawBlock(cx,x*SZ,gy*SZ,cur.type,SZ,0.12);});
  cur.cells.forEach(({x,y})=>{if(y>=0)drawBlock(cx,x*SZ,y*SZ,cur.type,SZ);});
  particles.forEach(p=>{cx.save();cx.globalAlpha=p.life;cx.shadowColor=p.color;cx.shadowBlur=8;cx.fillStyle=p.color;cx.beginPath();cx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);cx.fill();cx.restore();});
}
function drawHold(){hCx.clearRect(0,0,96,72);if(!hold)return;const s=FISH[hold].shape,mnX=Math.min(...s.map(p=>p[0])),mxX=Math.max(...s.map(p=>p[0])),mnY=Math.min(...s.map(p=>p[1])),mxY=Math.max(...s.map(p=>p[1])),sz=17,w=(mxX-mnX+1)*sz,h=(mxY-mnY+1)*sz,ox=(96-w)/2-mnX*sz,oy=(72-h)/2-mnY*sz;s.forEach(([x,y])=>drawBlock(hCx,ox+x*sz,oy+y*sz,hold,sz));}
function drawNext(){nCx.clearRect(0,0,96,250);queue.slice(0,3).forEach((t,i)=>{const s=FISH[t].shape,mnX=Math.min(...s.map(p=>p[0])),mxX=Math.max(...s.map(p=>p[0])),mnY=Math.min(...s.map(p=>p[1])),mxY=Math.max(...s.map(p=>p[1])),sz=14,w=(mxX-mnX+1)*sz,h=(mxY-mnY+1)*sz,ox=(96-w)/2-mnX*sz,oy=i*82+(78-h)/2-mnY*sz;s.forEach(([x,y])=>drawBlock(nCx,ox+x*sz,oy+y*sz,t,sz));});}
function updateUI(){
  document.getElementById('dScore').innerHTML=score.toLocaleString()+'<small>kg</small>';
  document.getElementById('dLevel').textContent=DEPTHS[Math.min(level-1,6)];
  document.getElementById('dLines').textContent=lines;
  document.getElementById('dCombo').textContent=combo;
  document.getElementById('dBar').style.width=(lines%10)/10*100+'%';
  drawNext();drawHold();
}

// Loop
function loop(t){
  requestAnimationFrame(loop);
  const dp=playing?Math.min((level-1)/6,1):0;drawBg(dp);
  if(!playing||paused)return;
  const dt=t-lastT;lastT=t;if(dt>1000)return;
  dropAcc+=dt;if(dropAcc>=speed){dropAcc-=speed;if(!move(0,1))lock();}
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life-=dt/900;});
  particles=particles.filter(p=>p.life>0);drawGame();
}

function startGame(){
  grid=Array.from({length:RO},()=>Array(CO).fill(0));bag=[];queue=[];hold=null;canSwap=true;
  score=0;lines=0;level=1;combo=0;speed=800;dropAcc=0;playing=true;paused=false;particles=[];
  fishCaught={};totalFish=0;lastT=performance.now();initFishGrid();spawn();updateUI();
  document.getElementById('ovStart').classList.add('hide');document.getElementById('ovEnd').classList.add('hide');
}
function gameEnd(){
  playing=false;document.getElementById('dFinal').textContent=score.toLocaleString()+'kg';
  const c=Object.entries(fishCaught).map(([t,n])=>`${FISH[t].emoji}${FISH[t].name} ×${n}`).join('  ');
  document.getElementById('dStats').textContent=`총 ${totalFish}마리 포획 | ${c}`;
  document.getElementById('ovEnd').classList.remove('hide');
}

document.addEventListener('keydown',e=>{
  if(!playing||!cur)return;if(e.code==='KeyP'){paused=!paused;lastT=performance.now();return;}if(paused)return;
  switch(e.code){case'ArrowLeft':e.preventDefault();move(-1,0);break;case'ArrowRight':e.preventDefault();move(1,0);break;case'ArrowDown':e.preventDefault();if(move(0,1))score+=1;updateUI();break;case'ArrowUp':e.preventDefault();rotate(1);break;case'KeyZ':rotate(-1);break;case'Space':e.preventDefault();hardDrop();break;case'KeyC':case'ShiftLeft':case'ShiftRight':doHold();break;}
});
function doAction(a){if(!playing||!cur||paused)return;switch(a){case'left':move(-1,0);break;case'right':move(1,0);break;case'soft':if(move(0,1))score+=1;updateUI();break;case'rotCW':rotate(1);break;case'hard':hardDrop();break;case'hold':doHold();break;}}
document.querySelectorAll('.mob-btn').forEach(b=>b.addEventListener('touchstart',e=>e.preventDefault()));
initFishGrid();requestAnimationFrame(loop);
</script>
</body>
</html>
